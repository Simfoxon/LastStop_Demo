<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Haltestellen App</title>
    <style>
        body {
        font-family: Arial, sans-serif;
        padding: 40px;
        background: #f5f5f5;
        }

        h1 {
        text-align: center;
        }

        .container {
        max-width: 400px;
        margin: auto;
        position: relative;
        }

        input {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        }

        .suggestions {
        background: white;
        border: 1px solid #ccc;
        border-top: none;
        position: absolute;
        width: 100%;
        max-height: 200px;
        overflow-y: auto;
        }

        .suggestion {
        padding: 10px;
        cursor: pointer;
        }

        .suggestion:hover {
        background: #eee;
        }
    </style>
</head>
<body>

    <h1>Wo willst du hin?</h1>

    <div class="container">
        <input type="text" id="search" placeholder="Haltestelle eingeben..." />
        <div id="suggestions" class="suggestions"></div>
    </div>

    <script>
        const input = document.getElementById("search");
        const suggestionsBox = document.getElementById("suggestions");

        let ziel = null;
        let notified = false;   

        // TEST-DATEN (später durch echte ersetzen)
        let stops = [];

        fetch("stops.txt")
            .then(res => res.text())
            .then(text => {
                const lines = text.split("\n").slice(1);

                stops = lines.map(line => {
                const parts = line.split('","').map(p => p.replace(/"/g, ''));

                return {
                    name: parts[2],
                    lat: parseFloat(parts[4]),
                    lon: parseFloat(parts[5])
                };
                }).filter(s => s.name);

                // 🔥 DOPPELTE ENTFERNEN HIER
                const uniqueStops = [];
                const seen = new Set();

                stops.forEach(stop => {
                    if (!seen.has(stop.name)) {
                        seen.add(stop.name);
                        uniqueStops.push(stop);
                    }
                });

                stops = uniqueStops;

                console.log("Stops geladen:", stops.length);

                // 🔥 HIER STARTEN
                startGPS();
            });

            
            input.addEventListener("input", () => {
            const value = input.value.toLowerCase();
            suggestionsBox.innerHTML = "";

            if (!value) return;

            const filtered = stops
                .filter(stop => stop.name.toLowerCase().includes(value))
                .slice(0, 10);

            filtered.forEach(stop => {
                const div = document.createElement("div");
                div.textContent = stop.name;
                div.classList.add("suggestion");

                div.onclick = () => {
                    input.value = stop.name;
                    suggestionsBox.innerHTML = "";

                    ziel = stop;
                    notified = false; // reset wenn neues Ziel
                };

                suggestionsBox.appendChild(div);
            });
            });

            function startGPS() {
                navigator.geolocation.watchPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;

                    checkDistance(lat, lon);
                });
            }

            function getDistance(lat1, lon1, lat2, lon2) {
                const R = 6371e3;

                const φ1 = lat1 * Math.PI / 180;
                const φ2 = lat2 * Math.PI / 180;

                const Δφ = (lat2 - lat1) * Math.PI / 180;
                const Δλ = (lon2 - lon1) * Math.PI / 180;

                const a =
                    Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
                    Math.cos(φ1) * Math.cos(φ2) *
                    Math.sin(Δλ / 2) * Math.sin(Δλ / 2);

                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

                return R * c;
            }

            function checkDistance(lat, lon) {
                if (!ziel) return;

                const dist = getDistance(lat, lon, ziel.lat, ziel.lon);

                console.log("Distanz:", Math.round(dist), "m");

                if (dist < 150 && !notified) {
                    notified = true;
                    alert("Du bist fast da!");
                }
            }
    </script>

</body>
</html>
